<canvas id="c" width="480" height="272"></canvas>

<script>
var canvas = document.getElementById("c");
var ctx = canvas.getContext("2d");
  
var TILE = 24;
var COLS = 21;
var ROWS = 13;
var PERIOD = 360;
var TWO_PI = 6.28318530;

var SIN_N = 1024;
var SIN_MASK = 1023;
var SIN_SCALE = SIN_N / TWO_PI;
var SIN = new Array(SIN_N);

for (var i = 0; i < SIN_N; i++) {
  SIN[i] = Math.sin(i / SIN_SCALE);
}

function isin(a) {
  var idx = (a * SIN_SCALE + 0.5) | 0;
  idx = idx & SIN_MASK;
  return SIN[idx];
}

/* PRECOMPUTE */
var offPhase = [], xPhase = [], yPhase = [], baseX = [], baseY = [], isDark = [];

var idx = 0;
for (var y = 0; y < ROWS; y++) {
  for (var x = 0; x < COLS; x++) {
    var px = x * TILE;
    var py = y * TILE;

    offPhase[idx] = (px + py) * 0.02;
    xPhase[idx] = px * 0.01;
    yPhase[idx] = py * 0.01;
    baseX[idx] = px;
    baseY[idx] = py;
    isDark[idx] = (x + y) & 1;

    idx++;
  }
}

var tick = 0;

function update() {
  var t = (tick / PERIOD) * TWO_PI;
  tick = (tick + 1) % PERIOD;

  var sinT = isin(t);
  var bvFull = (100 + 155 * sinT) | 0;

  ctx.clearRect(0, 0, 480, 272);

  idx = 0;

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {

      var off = isin(t + offPhase[idx]) * 5;
      var offI = off | 0;

      var rv = (100 + 155 * isin(t + xPhase[idx])) | 0;
      var gv = (100 + 155 * isin(t + yPhase[idx])) | 0;
      var bv = bvFull;

      if (isDark[idx]) {
        rv >>= 1;
        gv >>= 1;
        bv >>= 1;
      }

      rv &= 0xFC;
      gv &= 0xFC;
      bv &= 0xFC;

      ctx.fillStyle = "rgb(" + rv + "," + gv + "," + bv + ")";
      ctx.fillRect(baseX[idx] + offI, baseY[idx] + offI, TILE, TILE);

      idx++;
    }
  }
}

setInterval(update, 1);
</script>
