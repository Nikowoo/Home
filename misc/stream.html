<html>
<head>
  <title>stream.niko.horse</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      background:#111;
      color:#eee;
      font-family:monospace;
      text-align:center;
      padding:2em;
    }
    #player {
      width:80%;
      max-width:1000px;
      background:black;
    }
    #offlineImage {
      width:80%;
      max-width:1000px;
      display:none;
    }
  </style>
</head>
<body>

<h1>stream.niko.horse</h1>

<center>
<video id="player" controls autoplay muted></video>
<img id="offlineImage" src="https://niko.horse/files/images/stream/streamofff.png" />
</center>
<script>
const video = document.getElementById('player');
const offlineImage = document.getElementById('offlineImage');
const streamUrl = 'https://stream.niko.horse/live.m3u8';

let retryCount = 0;
const maxRetries = 5;        
const retryDelay = 300;     
const recheckInterval = 500;

function showOffline() {
    video.style.display = "none";
    offlineImage.style.display = "block";
    setTimeout(checkStream, recheckInterval);
}

function showPlayer() {
    video.style.display = "block";
    offlineImage.style.display = "none";
}

function startStream() {
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
        video.addEventListener('error', handleError);
        showPlayer();
    } else if (Hls.isSupported()) {
        const hls = new Hls({
            liveSyncDurationCount: 3,
            lowLatencyMode: true
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            retryCount = 0;
            showPlayer();
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                handleError();
            }
        });
    } else {
        showOffline();
    }
}

function handleError() {
    retryCount++;
    if (retryCount >= maxRetries) {
        showOffline();
    } else {
        setTimeout(checkStream, retryDelay);
    }
}

function checkStream() {
    fetch(streamUrl, { method: 'HEAD', cache: 'no-store' })
        .then(response => {
            if (response.ok) {
                retryCount = 0;
                startStream();
            } else {
                handleError();
            }
        })
        .catch(() => handleError());
}

checkStream();
</script>
