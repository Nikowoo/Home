<html>
<head>
  <title>stream.niko.horse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 0.75em 1em;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    header h1 {
      font-size: clamp(1rem, 4vw, 1.5rem);
      letter-spacing: 0.05em;
      color: #00ffcc;
    }

    #streamViewers {
      font-size: clamp(0.75rem, 2.5vw, 0.95rem);
      color: #aaa;
      margin-top: 0.3em;
      min-height: 1.2em;
    }

    .stream-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (min-width: 900px) {
      .stream-layout {
        flex-direction: row;
        height: calc(100vh - 70px);
      }
    }

    .video-wrap {
      flex: 1;
      background: #000;
      position: relative;
      min-height: 0;
    }

    #player, #offlineImage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @media (max-width: 899px) {
      .video-wrap {
        flex: none;
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        height: 0;
      }
    }

    #offlineImage { display: none; }

    #chat {
      border: none;
      background: #0e0e0e;
      flex-shrink: 0;
    }

    @media (min-width: 900px) {
      #chat {
        width: min(340px, 28vw);
      }
    }

    @media (max-width: 899px) {
      #chat {
        width: 100%;
        height: 420px;
      }
    }

    footer {
      text-align: center;
      padding: 0.5em 1em;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <h1 id="streamTitle">stream.niko.horse</h1>
  <div id="streamViewers"></div>
</header>

<main class="stream-layout">
  <div class="video-wrap">
    <video id="player" controls autoplay playsinline></video>
    <img id="offlineImage" src="https://niko.horse/files/images/stream/streamofff.png" alt="Stream offline" />
  </div>
  <iframe id="chat"
    src="https://www.twitch.tv/embed/donkeyniko/chat?parent=niko.horse"
    title="Twitch Chat">
  </iframe>
</main>

<footer>Stream chat handled via Twitch</footer>

<script>
const video = document.getElementById('player');
const offlineImage = document.getElementById('offlineImage');
const streamTitle = document.getElementById('streamTitle');
const streamViewers = document.getElementById('streamViewers');

const streamUrl = 'https://stream.niko.horse/live.m3u8';
const infoUrl   = 'https://stream.niko.horse/info.txt';
const pingUrl   = 'https://stream.niko.horse/ping';

const defaultTitle = 'Stream Offline';

let retryCount = 0, titleInterval = null, pingInterval = null;
const maxRetries = 5, retryDelay = 300, recheckInterval = 500, titleRefreshInterval = 500;
let currentTitle = "", currentViewers = "";
let streamIsLive = false;

function pingServer() { fetch(pingUrl, { cache: 'no-store' }).catch(() => {}); }

function fetchTitle() {
  fetch(infoUrl, { cache: 'no-store' })
    .then(r => {
      if (!r.ok) return;
      return r.text();
    })
    .then(text => {
      if (!text) return;

      const lines = text.split('\n');
      let title = "", viewers = "";

      for (const line of lines) {
        if (line.startsWith("title:"))   title   = line.substring(6).trim();
        if (line.startsWith("viewers:")) viewers = line.substring(8).trim();
      }

      if (title && title !== currentTitle) {
        currentTitle = title;
        streamTitle.textContent = title;
        document.title = title;
      }

      const viewersDisplay = viewers ? `${viewers} watching` : "";
      if (viewersDisplay !== currentViewers) {
        currentViewers = viewersDisplay;
        streamViewers.textContent = viewersDisplay;
      }
    })
    .catch(() => {
    });
}

function startTitleWatcher() {
  streamIsLive = true;
  if (titleInterval) return;
  fetchTitle();
  titleInterval = setInterval(fetchTitle, titleRefreshInterval);
  pingServer();
  pingInterval = setInterval(pingServer, 500);
}

function stopTitleWatcher() {
  streamIsLive = false;
  if (titleInterval) { clearInterval(titleInterval); titleInterval = null; }
  if (pingInterval)  { clearInterval(pingInterval);  pingInterval  = null; }
  currentTitle = "";
  currentViewers = "";
}

function showOffline() {
  video.style.display = "none";
  offlineImage.style.display = "block";

  stopTitleWatcher();

  currentTitle = "";
  currentViewers = "";

  streamTitle.textContent = defaultTitle;
  document.title = defaultTitle;
  streamViewers.textContent = "";

  setTimeout(checkStream, recheckInterval);
}

function showPlayer() {
  video.style.display = "block"; offlineImage.style.display = "none";
  startTitleWatcher();
}

function handleError() {
  retryCount++;
  if (retryCount >= maxRetries) showOffline();
  else setTimeout(checkStream, retryDelay);
}

function startStream() {
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamUrl;
    video.addEventListener('error', handleError);
    showPlayer();
  } else if (Hls.isSupported()) {
    const hls = new Hls({ liveSyncDurationCount: 3, lowLatencyMode: true });
    hls.loadSource(streamUrl); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { retryCount = 0; showPlayer(); });
    hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) handleError(); });
  } else { showOffline(); }
}

function checkStream() {
  fetch(streamUrl, { method: 'HEAD', cache: 'no-store' })
    .then(r => { if (r.ok) { retryCount = 0; startStream(); } else handleError(); })
    .catch(() => handleError());
}

checkStream();

    function syncChatHeight() {
  const videoWrap = document.querySelector('.video-wrap');
  const chat = document.getElementById('chat');
  if (window.innerWidth >= 900) { // desktop only
    const height = videoWrap.offsetHeight;
    chat.style.height = `${height}px`;
  } else {
    chat.style.height = '420px'; // fallback for mobile
  }
}

window.addEventListener('load', syncChatHeight);
window.addEventListener('resize', syncChatHeight);

const resizeObserver = new ResizeObserver(syncChatHeight);
resizeObserver.observe(document.querySelector('.video-wrap'));
</script>

</body>
</html>
